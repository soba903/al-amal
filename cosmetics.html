<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مستحضرات التجميل</title>
  <style>
    body {
      font-family: "Cairo", sans-serif;
      background: linear-gradient(to bottom, #ffffff, #e9f5ff);
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      color: #0077b6;
      margin-top: 30px;
      font-size: 2.2em;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .category-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: 0.3s;
      cursor: pointer;
    }

    .category-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .category-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .category-card h3 {
      text-align: center;
      padding: 15px;
      margin: 0;
      font-size: 1.3em;
      color: #023e8a;
    }

    .category-card{
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>🛍️ أقسام مستحضرات التجميل</h1>

  <div class="categories">

<div class="category-card" onclick="openCategory('hair-care')" style="cursor: pointer;">
  <img src="https://images.unsplash.com/photo-1589571894960-20bbe2828d0a?auto=format&fit=crop&w=600&q=80" alt="العناية بالشعر">
  <div class="grid-card">
    <div class="card-caption">العناية بالشعر</div>
  </div>
</div>


<div class="category-card" onclick="openCategory('skin-care')" style="cursor: pointer;">
  <img src="cosmetics-images/3naya-belbashra.webp" alt="">
  <div class="grid-card">
    <div class="card-caption">العناية بالبشرة</div>
  </div>
</div>

<div class="category-card" onclick="openCategory('baby-care')" style="cursor: pointer;">
<img src="cosmetics-images/3naya-atfal.webp" alt="">
  <div class="grid-card">
    <div class="card-caption">العناية بالاطفال</div>
  </div>
</div>

<div class="category-card" onclick="openCategory('perfumes')" style="cursor: pointer;">
  <img src="cosmetics-images/3naya-sha5sya.jpg" alt="">
  <div class="grid-card">
    <div class="card-caption">العطور و العنايه الشخصيه</div>
  </div>
</div>

<div class="category-card" onclick="openCategory('make-up')" style="cursor: pointer;">
<img src="cosmetics-images/tgmil.jpg" alt="">
  <div class="grid-card">
    <div class="card-caption">التجميل و الصبغات</div>
  </div>
</div>

<div class="category-card" onclick="openCategory('tissues')" style="cursor: pointer;">
<img src="cosmetics-images/mnadil.jpg" alt="">
  <div class="grid-card">
    <div class="card-caption">الفوط و المناديل الصحية</div>
  </div>
  </div>
  <script>
  function openCategory(page) {
  // نفتح صفحة القسم اللي المستخدم ضغط عليها
  window.location.href = page + ".html";
}
</script>
</body>
<script src="Cart.js"></script>
</html>
