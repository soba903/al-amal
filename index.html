<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شركة الأمل - الرئيسية</title>
    <style>
        /* الستايل ده هينضف الشكل فوراً */
        body { font-family: 'Cairo', sans-serif; background-color: #f0f4f8; margin: 0; padding: 0; }
        header { background: #0077b6; color: white; padding: 25px; text-align: center; font-size: 1.8em; font-weight: bold; }
        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; padding: 50px; }
        
        .card { 
            background: white; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 350px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: 0.4s; 
            border: 2px solid transparent;
        }
        .card:hover { transform: translateY(-15px); border-color: #0077b6; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-title { padding: 25px; text-align: center; font-size: 1.5em; font-weight: bold; color: #023e8a; }
    </style>
</head>
<script src="cart.js"></script>
<body>
    <header>الأمل للمستلزمات الطبية</header>
    <div id="cart-fab" onclick="window.location.href='cart.html'" style="position: fixed; bottom: 20px; left: 20px; background: #e91e63; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000;">
    🛒
    <span id="cart-count" style="position: absolute; top: 0; right: 0; background: white; color: #e91e63; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #e91e63;">0</span>
</div>

<script>
    // تحديث عدد المنتجات في الزرار أول ما الصفحة تفتح
    function updateCartBadge() {
        const cart = JSON.parse(localStorage.getItem('amalk_cart_v1')) || [];
        document.getElementById('cart-count').innerText = cart.length;
    }
    document.addEventListener("DOMContentLoaded", updateCartBadge);
</script>

    <div class="main-container">
        <div class="card" onclick="location.href='medical.html'">
            <img src="cosmetics-images/mostalzamat.webp" alt="مستلزمات" onerror="this.src='https://via.placeholder.com/350x250?text=Medical+Supplies'">
            <div class="card-title">مستلزمات طبية</div>
        </div>

        <div class="card" onclick="location.href='cosmetics.html'">
            <img src="cosmetics-images/mostahdarat-tgmil.jpeg" alt="تجميل" onerror="this.src='https://via.placeholder.com/350x250?text=Cosmetics'">
            <div class="card-title">مستحضرات تجميل</div>
        </div>
    </div>
</body>
</html>
