<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>شركة الأمل - الرئيسية</title>
    <link rel="stylesheet" href="style.css" />

    <script>
        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert("⚠️ يرجى تسجيل الدخول أولاً");
                // التعديل هنا: استخدمنا اللينك الكامل والمباشر لصفحة اللوجين
                window.location.href = "https://soba903.github.io/al-amal/frontend/"; 
            }
        };
    </script>
</head>
<body>
    <header style="background:#0077b6; color:white; padding:20px; text-align:center;">
        <h1>الأمل للمستلزمات الطبية</h1>
    </header>

    <main class="container">
        <div class="home-grid" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px;">
            
            <div class="grid-card" onclick="window.location.href='medical.html'" style="cursor:pointer; width: 300px; border: 1px solid #ddd; border-radius: 15px; overflow: hidden; background: #fff; text-align: center;">
                <img src="cosmetics-images/mostalzamat.webp" alt="مستلزمات" style="width: 100%; height: 200px; object-fit: cover;">
                <div style="padding: 15px; font-weight: bold; color: #023e8a;">مستلزمات طبية</div>
            </div>

            <div class="grid-card" onclick="window.location.href='cosmetics.html'" style="cursor:pointer; width: 300px; border: 1px solid #ddd; border-radius: 15px; overflow: hidden; background: #fff; text-align: center;">
                <img src="cosmetics-images/mostahdarat-tgmil.jpeg" alt="تجميل" style="width: 100%; height: 200px; object-fit: cover;">
                <div style="padding: 15px; font-weight: bold; color: #023e8a;">مستحضرات تجميل</div>
            </div>

        </div>
    </main>
</body>
</html>
