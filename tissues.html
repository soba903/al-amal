<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التجميل و الصبغات</title>
<style>
  body {
    font-family: "Cairo", sans-serif;
    margin: 0;
    padding: 0;
    background-color: #fff5f7;
    color: #333;
  }

  header {
    background-color:brown;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 1.6rem;
    font-weight: bold;
  }

  .search-bar {
    text-align: center;
    margin: 15px 0;
  }

  .search-bar input {
    width: 60%;
    max-width: 400px;
    padding: 10px;
    border: 2px solid brown;
    border-radius: 25px;
    outline: none;
    font-size: 1rem;
  }

  .products {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  padding: 20px;
}

/* للأجهزة المتوسطة زي التابلت */
@media (max-width: 1024px) {
  .products {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* للموبايلات */
@media (max-width: 768px) {
  .products {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* للموبايلات الصغيرة جدًا */
@media (max-width: 480px) {
  .products {
    grid-template-columns: 1fr;
  }
}


  .product {
    background-color: #ffffff;
    border-radius: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    padding: 15px;
    text-align: center;
    transition: transform 0.3s ease;
  }

  .product:hover {
    transform: translateY(-5px);
  }

  .product img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 15px;
  }

  .product h3 {
    color: #e91e63;
    font-size: 1.2rem;
    margin: 10px 0 5px;
  }

  .product p {
    font-size: 0.95rem;
    color: #555;
  }

  .product .price {
    font-size: 1.1rem;
    color: #444;
    margin: 5px 0 10px;
  }

  .product button {
    background-color: #e91e63;
    border: none;
    color: white;
    padding: 8px 15px;
    border-radius: 25px;
    cursor: pointer;
    margin: 5px;
    transition: 0.3s;
  }

  .product button:hover {
    background-color: #c2185b;
  }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #4caf50;
    color: white;
    padding: 15px 20px;
    border-radius: 25px;
    opacity: 0;
    transform: translateY(50px);
    transition: 0.4s ease;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

<header> قسم التجميل و الصبغات</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
</div>

<div class="products" id="productList">

  <!-- مثال منتج -->

</div>

<div class="toast" id="toast">تمت الإضافة إلى السلة 🛒</div>

<script>
  const searchInput = document.getElementById('searchInput');
  const products = document.querySelectorAll('.product');
  const toast = document.getElementById('toast');

  searchInput.addEventListener('keyup', function() {
    const value = this.value.toLowerCase();
    products.forEach(product => {
      const name = product.getAttribute('data-name').toLowerCase();
      product.style.display = name.includes(value) ? "block" : "none";
    });
  });

  function addToCart(productName) {
    toast.textContent = `تمت إضافة ${productName} إلى السلة 🛒`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }
  function buyNow(productName) {
  // حفظ اسم المنتج في localStorage
  localStorage.setItem("selectedProduct", productName);
  // التحويل لصفحة الدفع
  window.location.href = "checkout.html";
}
</script>
<script>
  function buyNow(productName) {
    const quantity = 1; // تقدر تخليها متغيرة لو عندك اختيار كمية
    const url = `checkout.html?product=${encodeURIComponent(productName)}&quantity=${quantity}`;
    window.location.href = url;
  }
</script>
<script>
  function buyNow(productName, qtyId) {
    const quantity = document.getElementById(qtyId).value || 1;
    const url = `checkout.html?product=${encodeURIComponent(productName)}&quantity=${encodeURIComponent(quantity)}`;
    window.location.href = url;
  }
</script>
</body>
<script>
const CART_KEY = "amalk_cart_v1";

// 1. دالة إضافة للسلة (بالشكل اللي إنت كاتبه في المنتجات)
function addToCart(name) {
    // الكود ده بيروح يدور في الصفحة على السعر اللي جنب الاسم ده
    const productDiv = document.querySelector(`[data-name="${name}"]`);
    const priceText = productDiv.querySelector('.price').innerText;
    const price = parseFloat(priceText.replace(/[^\d.]/g, '')); // بيستخرج رقم 137.00

    let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
    let existingItem = cart.find(item => item.name === name);

    if (existingItem) {
        existingItem.quantity += 1;
    } else {
        cart.push({ name: name, price: price, quantity: 1 });
    }

    localStorage.setItem(CART_KEY, JSON.stringify(cart));
    alert("✅ تم إضافة " + name + " للسلة");
}

// 2. دالة اشترِ الآن (بالشكل اللي إنت كاتبه في المنتجات)
function buyNow(name, qtyId) {
    // برضه هنسحب السعر أوتوماتيك من الصفحة
    const productDiv = document.querySelector(`[data-name="${name}"]`);
    const priceText = productDiv.querySelector('.price').innerText;
    const price = parseFloat(priceText.replace(/[^\d.]/g, ''));
    
    const qty = document.getElementById(qtyId).value || 1;

    // بنحول لصفحة الـ checkout مع بعت السعر والكمية في الرابط
    window.location.href = `checkout.html?product=${encodeURIComponent(name)}&price=${price}&quantity=${qty}`;
}
</script>
