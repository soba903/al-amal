<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>
    // 1. شوف هل فيه توكن مبعوث في العنوان؟
    const urlParams = new URLSearchParams(window.location.search);
    const tokenFromUrl = urlParams.get('token');

    // 2. لو فيه توكن مبعوث، سيفه عندك فوراً
    if (tokenFromUrl) {
        localStorage.setItem('token', tokenFromUrl);
        // نظف العنوان عشان التوكن ما يفضلش باين فوق
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    // 3. الكمين العادي بتاعنا
    const token = localStorage.getItem('token');
    if (!token) {
        alert("⚠️ عذراً، يجب تسجيل الدخول أولاً!");
        window.location.replace("http://localhost:3001");
    }
</script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>الأمل للمستلزمات الطبية</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="site-header">
    <div class="container header-inner">
      <div class="brand">الأمل للمستلزمات الطبية</div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">الرئيسية</a>
        <a href="contact.html" class="nav-link">اتصل بنا</a>
        <button onclick="logout()" style="background: #e94560; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: bold; margin-right: 15px;">
          تسجيل خروج 🚪
        </button>
      </nav>
    </div>
  </header>

  <script>
    function logout() {
        localStorage.removeItem('token'); // مسح التوكن من المتصفح
        alert("تم تسجيل الخروج بنجاح 👋");
        window.location.href = "http://localhost:3001"; // الرجوع لصفحة الـ React
    }
  </script>
  <!-- put in header of every page -->
<header class="site-header">
  <div class="cart-wrapper" style="position:relative;">
    <button id="openCartBtn" onclick="window.location.href='cart.html'" 
            style="background:#2f1ee9;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;">
      السلة 🛒 <span id="cartCount" style="background:#fff;color:black;border-radius:50%;padding:2px 8px;margin-top:8px;">0</span>
    </button>
  </div>
</header>

  <main class="container">

    </section>

    <!-- Grid: 2 on top, 1 centered below -->
    <section class="home-grid">
      <div class="grid-row">

  </main>

  <footer class="site-footer">
    <div class="container">© 2025 الأمل للمستلزمات الطبية — جميع الحقوق محفوظة</div>

</body>
