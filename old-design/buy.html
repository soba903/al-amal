<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>شراء المنتج</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>تفاصيل الشراء</h1></header>
  <button onclick="buyProduct('كريم ترطيب الوجه')">شراء الآن</button>


  <section class="form-section">
    <form id="buy-form">
      <input type="text" name="name" placeholder="الاسم الكامل" required>
      <input type="email" name="email" placeholder="البريد الإلكتروني" required>
      <input type="text" name="address" placeholder="العنوان" required>
      <input type="text" name="phone" placeholder="رقم الهاتف" required>
      <button type="submit" onclick="navigateTo('checkout')">متابعة للدفع</button>
    </form>
  </section>
  <script>
  function buyProduct(productName) {
    // نخزن اسم المنتج في الرابط وننتقل لصفحة الشراء
    window.location.href = `./checkout.html?product=${encodeURIComponent(productName)}`;

  }
</script>


  <script src="int.js"></script>
</body>
</html>
