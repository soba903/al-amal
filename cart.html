<script>
function renderCart() {
  const cart = getCart();
  const div = document.getElementById('cartContainer');

  if (cart.length === 0) {
    div.innerHTML = "<p>السلة فارغة حالياً.</p>";
    return;
  }

  // ضفت عمود الكمية في العناوين عشان الجدول يظبط
  let html = "<table><tr><th>الاسم</th><th>السعر</th><th>الكمية</th><th>إزالة</th></tr>";

  cart.forEach((item, index) => {
    html += `
      <tr>
        <td>${item.name}</td>
        <td>${item.price} ج.م</td>
        <td>${item.quantity || 1}</td>
        <td><button onclick="removeItem(${index})">حذف</button></td>
      </tr>`;
  });

  html += "</table>";
  
  // حساب الإجمالي
  const total = cart.reduce((sum, item) => sum + (parseFloat(item.price) * (item.quantity || 1)), 0);
  html += `<div class="total"><strong>الإجمالي: ${total} ج.م</strong></div>`;

  div.innerHTML = html;
}
</script>
