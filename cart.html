<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <title>سلة المشتريات - شركة الأمل</title>
<style>
    /* حاوية السلة الرئيسية */
#cartContainer {
    max-width: 800px;
    margin: 20px auto;
    padding: 25px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px); /* تأثير زجاجي */
    border-radius: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    border: 1px solid rgba(255,255,255,0.2);
}

/* كارت المنتج الواحد */
.cart-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 20px;
    transition: transform 0.3s ease;
    border-right: 8px solid #27ae60; /* لون الأمل الأخضر */
}

.cart-item:hover {
    transform: translateY(-5px); /* حركة خفيفة لما تلمسها */
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* تفاصيل المنتج */
.cart-item-info h4 {
    margin: 0;
    font-size: 1.2rem;
    color: #2c3e50;
    font-weight: 800;
}

.cart-item-info p {
    margin: 5px 0 0;
    color: #27ae60;
    font-weight: bold;
    font-size: 1.1rem;
}

/* زرار الحذف (Trash Icon Style) */
.remove-item {
    background: #fff0f0;
    color: #ff4757;
    border: 2px solid #ff4757;
    padding: 10px 15px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.remove-item:hover {
    background: #ff4757;
    color: white;
}

/* المجموع النهائي */
#finalTotalPrice {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 900;
    color: #2c3e50;
    margin-top: 20px;
    padding: 15px;
    border-top: 2px dashed #ddd;
}
</style>
</head>
<body>

<div class="cart-container">
    <h1>سلة المشتريات 🛒</h1>
    <div id="cartContent"></div>
    <div id="totalArea" class="total-price"></div>
    <button class="btn-checkout" onclick="window.location.href='checkout.html'">إتمام الشراء</button>
</div>

<script>
    const CART_KEY = "amalk_cart_v1";

function renderCart() {
    const cart = JSON.parse(localStorage.getItem("amalk_cart_v1")) || [];
    const container = document.getElementById('cartContent');
    const totalArea = document.getElementById('totalArea'); // تأكد إن الـ ID ده موجود في الـ HTML

    if (cart.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>السلة فارغة</p>";
        totalArea.innerHTML = "";
        return;
    }

    let html = "<table><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>إزالة</th></tr>";
    let totalValue = 0;

    cart.forEach((item, index) => {
        let price = Number(item.price) || 0;
        let qty = Number(item.quantity) || 1;
        totalValue += (price * qty);

        html += `<tr>
            <td>${item.name}</td>
            <td>${price} ج.م</td>
            <td>${qty}</td>
            <td><button class="btn-delete" onclick="removeItem(${index})">حذف</button></td>
        </tr>`;
    });

    container.innerHTML = html + "</table>";
    // ده السطر اللي هيعرض الإجمالي صح
    totalArea.innerHTML = "إجمالي السلة: " + totalValue + " ج.م"; 
}

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
        cart.splice(index, 1);
        localStorage.setItem(CART_KEY, JSON.stringify(cart));
        renderCart();
    }

    document.addEventListener("DOMContentLoaded", renderCart);
</script>
</body>
</html>
