<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <title>سلة المشتريات - شركة الأمل</title>
    <style>
        body { font-family: Cairo, sans-serif; background: #f0f4f8; padding: 20px; }
        .cart-container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #0077b6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
        th { background: #0077b6; color: white; }
        .total-price { font-size: 1.5em; font-weight: bold; color: #e91e63; text-align: left; margin-top: 20px; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-checkout { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; display: block; width: 100%; font-size: 1.2em; margin-top: 20px; }
    </style>
</head>
<body>

<div class="cart-container">
    <h1>سلة المشتريات 🛒</h1>
    <div id="cartContent">
        </div>
    <div id="totalArea" class="total-price"></div>
    <button class="btn-checkout" onclick="alert('جارٍ تحويلك للدفع...')">إتمام الشراء</button>
</div>

<script>
    // تأكد إن الاسم ده هو نفسه اللي في صفحة المنتجات
    const CART_KEY = "amalk_cart_v1";

function renderCart() {
    const cart = JSON.parse(localStorage.getItem("amalk_cart_v1")) || [];
    const container = document.getElementById('cartContent'); // تأكد إن الـ ID ده موجود
    const totalArea = document.getElementById('totalArea');

    if (cart.length === 0) {
        container.innerHTML = "<p>السلة فارغة.</p>";
        totalArea.innerHTML = "";
        return;
    }

    let html = "<table><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>إزالة</th></tr>";
    let total = 0;

    cart.forEach((item, index) => {
        // تحويل السعر لرقم نظيف (بيشيل أي حروف زيادة)
        let price = parseFloat(item.price) || 0; 
        let quantity = parseInt(item.quantity) || 1;
        let subtotal = price * quantity;
        total += subtotal;

        html += `
            <tr>
                <td>${item.name}</td>
                <td>${price} ج.م</td>
                <td>${quantity}</td>
                <td><button onclick="removeItem(${index})">حذف</button></td>
            </tr>`;
    });

    html += "</table>";
    container.innerHTML = html;
    // هنا الإجمالي هيتكتب صح بدل NaN
    totalArea.innerHTML = `<h3>الإجمالي: ${total} ج.م</h3>`; 
}

// تعديل زرار "إتمام الشراء" في صفحة cart.html عشان يروح لصفحة الـ checkout
function goToCheckout() {
    window.location.href = "checkout.html";
}

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
        cart.splice(index, 1);
        localStorage.setItem(CART_KEY, JSON.stringify(cart));
        renderCart();
    }

    // تشغيل الدالة أول ما الصفحة تفتح
    document.addEventListener("DOMContentLoaded", renderCart);
</script>

</body>
</html>
