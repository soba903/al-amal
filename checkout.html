<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام عملية الشراء - شركة الأمل</title>
  <style>
    body { font-family: "Cairo", sans-serif; background-color: #f9fbfd; margin: 0; padding: 20px; }
    .checkout-container { max-width: 600px; margin: 40px auto; background: #fff; padding: 35px 40px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08); }
    h2 { text-align: center; color: #007bff; margin-bottom: 25px; }
    label { display: block; font-weight: bold; color: #333; margin-bottom: 6px; font-size: 15px; }
    input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ccc; font-size: 15px; outline: none; box-sizing: border-box; }
    .readonly-field { background: #f2f2f2; font-weight: bold; color: #555; }
    .price-tag { background: #fff0f5; color: #e91e63; padding: 10px; border-radius: 10px; text-align: center; font-size: 1.2em; font-weight: bold; margin-bottom: 20px; border: 1px dashed #e91e63; }
    button { width: 100%; background-color: #007bff; color: white; font-size: 18px; padding: 14px; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
    button:hover { background-color: #0056b3; }
  </style>
</head>
<body>

  <div class="checkout-container">
    <h2>إتمام عملية الشراء 🛍️</h2>
    
    <div id="finalTotalPrice" class="price-tag">إجمالي المبلغ: جاري الحساب...</div>

    <form id="checkoutForm">
      <label>بيانات الطلب:</label>
      <input type="text" id="productName" name="productName" class="readonly-field" readonly>

      <label>إجمالي القطع:</label>
      <input type="number" id="productQuantity" name="productQuantity" class="readonly-field" readonly>

      <label>الاسم الكامل:</label>
      <input type="text" name="name" placeholder="اكتب اسمك بالكامل" required>

      <label>رقم الهاتف:</label>
      <input type="tel" name="phone" placeholder="01000000000" required>

      <label>العنوان:</label>
      <textarea name="address" placeholder="اكتب عنوانك بالتفصيل" rows="3" required></textarea>

      <label>طريقة الدفع:</label>
      <select name="paymentMethod" required>
        <option value="">اختر طريقة الدفع</option>
        <option value="Vodafone cash">Vodafone cash</option>
        <option value="Insta pay">Insta pay</option>
        <option value="Credit card">Credit card</option>
      </select>

      <button type="submit">إرسال الطلب عبر البريد</button>
    </form>
  </div>
<script>
window.onload = function() {
    const CART_KEY = "amalk_cart_v1"; // نفس الاسم الموحد
    const urlParams = new URLSearchParams(window.location.search);
    
    // بيانات "اشترِ الآن" من الرابط
    const singleProduct = urlParams.get('product');
    const singlePrice = urlParams.get('price');
    const singleQty = urlParams.get('quantity');

    const productNameInput = document.getElementById('productName');
    const productQuantityInput = document.getElementById('productQuantity');
    const totalPriceDiv = document.getElementById('finalTotalPrice');

    // الحالة 1: لو داس "اشترِ الآن" (منتج واحد)
    if (singleProduct && singlePrice) {
        productNameInput.value = singleProduct;
        productQuantityInput.value = singleQty;
        let total = parseFloat(singlePrice) * parseInt(singleQty);
        totalPriceDiv.innerText = `طلب منتج واحد - الإجمالي: ${total.toFixed(2)} جنيه`;
    } 
    // الحالة 2: لو جاي من السلة (أكثر من منتج)
    else {
        let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
        
        if (cart.length > 0) {
            // هيجيب أسامي كل المنتجات في السلة ويحط بينهم " + "
            productNameInput.value = cart.map(item => item.name).join(" + ");
            
            // هيجمع إجمالي القطع
            let totalQty = cart.reduce((sum, item) => sum + parseInt(item.quantity), 0);
            productQuantityInput.value = totalQty;

            // هيحسب السعر الإجمالي لكل المنتجات
            let totalCash = cart.reduce((sum, item) => sum + (parseFloat(item.price) * parseInt(item.quantity)), 0);
            totalPriceDiv.innerText = `إجمالي طلبات السلة: ${totalCash.toFixed(2)} جنيه`;
        } else {
            productNameInput.value = "لا توجد منتجات";
            productQuantityInput.value = "0";
            totalPriceDiv.innerText = "القائمة فارغة";
        }
    }
}
document.getElementById('checkoutForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    // إظهار رسالة تحميل
    const btn = event.target.querySelector('button');
    btn.innerText = "جاري الإرسال...";

    emailjs.sendForm('service_xxxx', 'template_xxxx', this) // حط الـ IDs بتاعتك هنا
        .then(function() {
            alert('✅ تم إرسال طلبك لشركة الأمل بنجاح!');
            localStorage.removeItem("amalk_cart_v1"); // مسح السلة
            window.location.href = "index.html";
        }, function(error) {
            alert('❌ عذراً، حدث خطأ في الإرسال');
            btn.innerText = "إرسال الطلب عبر البريد";
        });
});
</script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script type="text/javascript">
  // الطريقة دي بتضمن إن الـ Public Key يتفعل صح
  (function() {
      emailjs.init("SvpoqikClslazGM2Z");
  })();

  document.getElementById('checkoutForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const btn = event.target.querySelector('button');
    btn.innerText = "جاري الإرسال... ⏳";
    btn.disabled = true;

    // بنستخدم emailjs.sendForm وبنمرر له الـ IDs اللي إنت لسه كاتبهم
    emailjs.sendForm('service_34tw6rq', 'template_11oixht', this)
      .then(function() {
        alert('✅ تم إرسال طلبك بنجاح! شكراً لتعاملك مع شركة الأمل.');
        localStorage.removeItem("amalk_cart_v1");
        window.location.href = "index.html"; 
      }, function(error) {
        // لو فشل، هيطلع لنا رسالة أوضح للخطأ
        console.error('FAILED...', error);
        alert('❌ فشل الإرسال: ' + (error.text || "تأكد من إعدادات EmailJS"));
        btn.innerText = "إرسال الطلب عبر البريد";
        btn.disabled = false;
      });
  });
</script>
</body>
</html>
