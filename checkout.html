<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام عملية الشراء - شركة الأمل</title>
  <style>
    body { font-family: "Cairo", sans-serif; background-color: #f9fbfd; margin: 0; padding: 20px; }
    .checkout-container { max-width: 600px; margin: 40px auto; background: #fff; padding: 35px 40px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08); }
    h2 { text-align: center; color: #007bff; margin-bottom: 25px; }
    label { display: block; font-weight: bold; color: #333; margin-bottom: 6px; font-size: 15px; }
    input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ccc; font-size: 15px; outline: none; box-sizing: border-box; }
    .readonly-field { background: #f2f2f2; font-weight: bold; color: #555; }
    .price-tag { background: #fff0f5; color: #e91e63; padding: 10px; border-radius: 10px; text-align: center; font-size: 1.2em; font-weight: bold; margin-bottom: 20px; border: 1px dashed #e91e63; }
    button { width: 100%; background-color: #007bff; color: white; font-size: 18px; padding: 14px; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
    button:hover { background-color: #0056b3; }
  </style>
</head>
<body>

  <div class="checkout-container">
    <h2>إتمام عملية الشراء 🛍️</h2>
    
    <div id="finalTotalPrice" class="price-tag">إجمالي المبلغ: جاري الحساب...</div>

    <form id="checkoutForm">
      <label>بيانات الطلب:</label>
      <input type="text" id="productName" name="productName" class="readonly-field" readonly>

      <label>إجمالي القطع:</label>
      <input type="number" id="productQuantity" name="productQuantity" class="readonly-field" readonly>

      <label>الاسم الكامل:</label>
      <input type="text" name="name" placeholder="اكتب اسمك بالكامل" required>

      <label>رقم الهاتف:</label>
      <input type="tel" name="phone" placeholder="01000000000" required>

      <label>العنوان:</label>
      <textarea name="address" placeholder="اكتب عنوانك بالتفصيل" rows="3" required></textarea>

      <label>طريقة الدفع:</label>
      <select name="paymentMethod" required>
        <option value="">اختر طريقة الدفع</option>
        <option value="Vodafone cash">Vodafone cash</option>
        <option value="Insta pay">Insta pay</option>
        <option value="Credit card">Credit card</option>
      </select>

      <button type="submit">إرسال الطلب عبر البريد</button>
    </form>
  </div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
  (function() {
    emailjs.init("SvpoqikCIslazGM2Z"); 
  })();

  document.addEventListener("DOMContentLoaded", function() {
    const CART_KEY = "amalk_cart_v1";
    const params = new URLSearchParams(window.location.search);
    
    // جلب بيانات لو الطلب جاي "فردي" من اللينك
    const urlProduct = params.get("product");
    const urlQty = params.get("quantity") || 1;
    const urlPrice = params.get("price") || 0;

    const productInput = document.getElementById("productName");
    const quantityInput = document.getElementById("productQuantity");
    const priceDisplay = document.getElementById("finalTotalPrice");

    let finalTotal = 0;

    // 1. فحص هل يوجد منتج فردي؟
    if (urlProduct) {
        productInput.value = urlProduct;
        quantityInput.value = urlQty;
        finalTotal = Number(urlPrice) * Number(urlQty);
    } 
    // 2. لو مفيش فردي، نسحب بيانات السلة كاملة
    else {
        const cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
        if (cart.length > 0) {
            productInput.value = cart.map(i => `${i.name} (${i.quantity})`).join(" - ");
            quantityInput.value = cart.reduce((sum, i) => sum + Number(i.quantity), 0);
            finalTotal = cart.reduce((sum, i) => sum + (Number(i.price) * Number(i.quantity)), 0);
        } else {
            productInput.value = "لا توجد منتجات";
            quantityInput.value = 0;
            finalTotal = 0;
        }
    }

    // عرض السعر النهائي
    priceDisplay.textContent = "إجمالي المبلغ: " + finalTotal + " ج.م";

    // 3. إرسال الطلب
    document.getElementById("checkoutForm").addEventListener("submit", function(e) {
      e.preventDefault();
      
      const submitBtn = this.querySelector('button');
      submitBtn.innerText = "جاري الإرسال...";
      submitBtn.disabled = true;

      emailjs.send('service_34tw6rq', 'template_11oixht', {
        name: this.name.value,
        phone: this.phone.value,
        address: this.address.value,
        paymentMethod: this.paymentMethod.value,
        productName: productInput.value,
        productQuantity: quantityInput.value,
        totalPrice: finalTotal // بعتلك الإجمالي كمان للإيميل
      }).then(() => {
        alert("✅ تم إرسال طلبك بنجاح! سنتواصل معك قريباً.");
        localStorage.removeItem(CART_KEY); // تنظيف السلة بعد الشراء
        window.location.href = "index.html";
      }).catch((err) => {
        alert("❌ حدث خطأ، حاول مرة أخرى.");
        console.error(err);
        submitBtn.innerText = "إرسال الطلب";
        submitBtn.disabled = false;
      });
    });
  });
</script>
</body>
</html>
