<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إتمام عملية الشراء</title>
  <style>
    body { font-family: "Cairo", sans-serif; background-color: #f9fbfd; padding: 20px; }
    .checkout-container { max-width: 600px; margin: auto; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
    input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
    button { width: 100%; background-color: #007bff; color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; }
    .readonly-field { background: #f2f2f2; }
  </style>
</head>
<body>

<div class="checkout-container">
    <h2>إتمام عملية الشراء</h2>
    <form id="checkoutForm">
      <label>بيانات الطلب:</label>
      <input type="text" id="productName" name="productName" class="readonly-field" readonly>
      <label>إجمالي القطع:</label>
      <input type="number" id="productQuantity" name="productQuantity" class="readonly-field" readonly>
      
      <input type="text" name="name" placeholder="الاسم الكامل" required>
      <input type="email" name="email" placeholder="البريد الإلكتروني" required>
      <input type="tel" name="phone" placeholder="رقم الهاتف" required>
      <textarea name="address" placeholder="العنوان بالتفصيل" rows="3" required></textarea>
      
      <select name="paymentMethod" required>
        <option value="">اختر طريقة الدفع</option>
        <option value="Vodafone cash">Vodafone cash</option>
        <option value="Insta pay">Insta pay</option>
        <option value="Credit card">Credit card</option>
      </select>
      
      <button type="submit">إرسال الطلب</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
  (function() { emailjs.init("SvpoqikCIslazGM2Z"); })();

  document.addEventListener("DOMContentLoaded", function() {
      const CART_KEY = "amalk_cart_v1";
      const cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
      const productInput = document.getElementById("productName");
      const quantityInput = document.getElementById("productQuantity");

      if (cart.length > 0) {
          // تجميع المنتجات في نص واحد للفاتورة
          productInput.value = cart.map(i => `${i.name} (${i.quantity})`).join(" - ");
          quantityInput.value = cart.reduce((sum, i) => sum + i.quantity, 0);
      }

      document.getElementById("checkoutForm").addEventListener("submit", function(e) {
          e.preventDefault();
          
          emailjs.send('service_34tw6rq', 'template_11oixht', {
              name: this.name.value,
              email: this.email.value,
              phone: this.phone.value,
              address: this.address.value,
              paymentMethod: this.paymentMethod.value,
              productName: productInput.value,
              productQuantity: quantityInput.value
          }).then(() => {
              alert("✅ تم إرسال طلبك بنجاح!");
              localStorage.removeItem(CART_KEY);
              window.location.href = "index.html";
          });
      });
  });
</script>
</body>
</html>
