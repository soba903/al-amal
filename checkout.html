<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام عملية الشراء - شركة الأمل</title>
  <style>
    body { font-family: "Cairo", sans-serif; background-color: #f9fbfd; margin: 0; padding: 20px; }
    .checkout-container { max-width: 600px; margin: 40px auto; background: #fff; padding: 35px 40px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08); }
    h2 { text-align: center; color: #007bff; margin-bottom: 25px; }
    label { display: block; font-weight: bold; color: #333; margin-bottom: 6px; font-size: 15px; }
    input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ccc; font-size: 15px; outline: none; box-sizing: border-box; }
    .readonly-field { background: #f2f2f2; font-weight: bold; color: #555; }
    .price-tag { background: #fff0f5; color: #e91e63; padding: 10px; border-radius: 10px; text-align: center; font-size: 1.2em; font-weight: bold; margin-bottom: 20px; border: 1px dashed #e91e63; }
    button { width: 100%; background-color: #007bff; color: white; font-size: 18px; padding: 14px; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
    button:hover { background-color: #0056b3; }
  </style>
</head>
<body>

  <div class="checkout-container">
    <h2>إتمام عملية الشراء 🛍️</h2>
    
    <div id="finalTotalPrice" class="price-tag">إجمالي المبلغ: جاري الحساب...</div>

    <form id="checkoutForm">
      <label>بيانات الطلب:</label>
      <input type="text" id="productName" name="productName" class="readonly-field" readonly>

      <label>إجمالي القطع:</label>
      <input type="number" id="productQuantity" name="productQuantity" class="readonly-field" readonly>

      <label>الاسم الكامل:</label>
      <input type="text" name="name" placeholder="اكتب اسمك بالكامل" required>

      <label>رقم الهاتف:</label>
      <input type="tel" name="phone" placeholder="01000000000" required>

      <label>العنوان:</label>
      <textarea name="address" placeholder="اكتب عنوانك بالتفصيل" rows="3" required></textarea>

      <label>طريقة الدفع:</label>
      <select name="paymentMethod" required>
        <option value="">اختر طريقة الدفع</option>
        <option value="Vodafone cash">Vodafone cash</option>
        <option value="Insta pay">Insta pay</option>
        <option value="Credit card">Credit card</option>
      </select>

      <button type="submit">إرسال الطلب عبر البريد</button>
    </form>
  </div>

<script>
window.onload = function() {
    // 1. هنجيب البيانات من الرابط (لو داس اشترِ الآن)
    const urlParams = new URLSearchParams(window.location.search);
    const singleProduct = urlParams.get('product');
    
    // 2. هنجيب الأسماء من السلة (لو كان ضايف منتجات)
    // ملحوظة: تأكد إن الاسم "simple_order_list" هو نفس اللي استعملناه في addToCart
    let cart = JSON.parse(localStorage.getItem("simple_order_list")) || [];
    
    const productNameInput = document.getElementById('productName');
    const productQuantityInput = document.getElementById('productQuantity');
    const totalPriceDiv = document.getElementById('finalTotalPrice');

    let finalOrderText = "";
    let totalItems = 0;

    if (singleProduct) {
        // حالة "اشترِ الآن"
        finalOrderText = singleProduct;
        totalItems = 1;
        totalPriceDiv.innerText = "طلب منتج واحد"; // لأننا لغينا الحسابات المالية حالياً
    } else if (cart.length > 0) {
        // حالة "السلة"
        finalOrderText = cart.join(" - "); // هيحط المنتجات جنب بعضها
        totalItems = cart.length;
        totalPriceDiv.innerText = "إجمالي عدد الأصناف: " + totalItems;
    } else {
        finalOrderText = "لا توجد منتجات";
        totalPriceDiv.innerText = "القائمة فارغة";
    }

    // 3. بنحط الكلام ده في الـ Inputs عشان يتبعت مع الفورم
    if (productNameInput) productNameInput.value = finalOrderText;
    if (productQuantityInput) productQuantityInput.value = totalItems;
}

// دالة نمسح بيها السلة (نادي عليها لما الطلب يتبعت بنجاح في EmailJS)
function clearCartAfterOrder() {
    localStorage.removeItem("simple_order_list");
}
</script>
</body>
</html>
